name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew :plugin:build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: NothingLink
          path: plugin/build/libs/*.jar
